<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gear shape -->
    <g id="gear">
      <circle cx="150" cy="150" r="70" fill="#4F7EA8"></circle>
      <!-- Teeth -->
      <rect x="145" y="40" width="10" height="25" fill="#4F7EA8"></rect>
      <rect x="145" y="235" width="10" height="25" fill="#4F7EA8"></rect>
      <rect x="235" y="145" width="25" height="10" fill="#4F7EA8"></rect>
      <rect x="40" y="145" width="25" height="10" fill="#4F7EA8"></rect>
      
      <rect x="210" y="70" width="10" height="25" transform="rotate(45 215 82)" fill="#4F7EA8"></rect>
      <rect x="70" y="210" width="10" height="25" transform="rotate(45 75 222)" fill="#4F7EA8"></rect>
      <rect x="210" y="205" width="10" height="25" transform="rotate(-45 215 217)" fill="#4F7EA8"></rect>
      <rect x="70" y="65" width="10" height="25" transform="rotate(-45 75 77)" fill="#4F7EA8"></rect>
    </g>
  </defs>

  <!-- Connections -->
  <g stroke="#111" stroke-width="6" stroke-linecap="round">
    <line x1="150" y1="20" x2="150" y2="80"></line>
    <line x1="280" y1="150" x2="220" y2="150"></line>
    <line x1="150" y1="280" x2="150" y2="220"></line>
    <line x1="20" y1="150" x2="80" y2="150"></line>
    <line x1="240" y1="60" x2="200" y2="100"></line>
    <line x1="240" y1="240" x2="200" y2="200"></line>
    <line x1="60" y1="240" x2="100" y2="200"></line>
    <line x1="60" y1="60" x2="100" y2="100"></line>
  </g>

  <!-- Outer service nodes -->
  <g stroke="#111" stroke-width="6">
    <circle cx="150" cy="20" r="18" fill="#EF4444"></circle>
    <circle cx="280" cy="150" r="18" fill="#10B981"></circle>
    <circle cx="150" cy="280" r="18" fill="#FACC15"></circle>
    <circle cx="20" cy="150" r="18" fill="#F97316"></circle>
    <circle cx="240" cy="60" r="14" fill="#60A5FA"></circle>
    <circle cx="240" cy="240" r="14" fill="#F87171"></circle>
    <circle cx="60" cy="240" r="14" fill="#34D399"></circle>
    <circle cx="60" cy="60" r="14" fill="#FDE68A"></circle>
  </g>

  <!-- Gear -->
  <use href="#gear"></use>

  <!-- Cube -->
  <g stroke="#111" stroke-width="6" fill="#EAB308">
    <polygon points="150,115 185,135 150,155 115,135"></polygon>
    <polygon points="115,135 115,175 150,195 150,155"></polygon>
    <polygon points="185,135 185,175 150,195 150,155"></polygon>
  </g>
</svg>